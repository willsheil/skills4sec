# .gitea/workflows/submission.yml
name: Process Skill Submission

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'Repository URL (GitHub or Gitea)'
        required: true
      skill_path:
        description: 'Skill path (optional, e.g., .claude/skills/my-skill)'
        required: false
        default: ''

env:
  GITEA_API_URL: http://172.28.95.77:3000/api/v1

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      skill_count: ${{ steps.discover.outputs.skill_count }}
      branch_name: ${{ steps.pr.outputs.branch_name }}

    steps:
      - name: Checkout repository
        env:
          GITEA_TOKEN: ${{ secrets.GITEATOKEN }}
        run: |
          git clone http://oauth2:${GITEA_TOKEN}@172.28.95.77:3000/${{ github.repository }}.git .
          git checkout ${{ github.sha }}

      - name: Parse source URL
        id: parse
        env:
          SOURCE_URL: ${{ inputs.source_url }}
        run: |
          set -euo pipefail
          URL="$SOURCE_URL"

          if [[ "$URL" =~ github\.com[:/]([^/]+)/([^/]+) ]]; then
            PLATFORM="github"
            OWNER="${BASH_REMATCH[1]}"
            REPO="${BASH_REMATCH[2]}"
            REPO="${REPO%.git}"
            CLONE_URL="https://github.com/${OWNER}/${REPO}.git"
          elif [[ "$URL" =~ 172\.28\.95\.77:3000[:/]([^/]+)/([^/]+) ]]; then
            PLATFORM="gitea"
            OWNER="${BASH_REMATCH[1]}"
            REPO="${BASH_REMATCH[2]}"
            REPO="${REPO%.git}"
            CLONE_URL="http://172.28.95.77:3000/${OWNER}/${REPO}.git"
          else
            echo "::error::Unsupported URL format: $URL"
            exit 1
          fi

          echo "platform=$PLATFORM"
          echo "owner=$OWNER"
          echo "repo=$REPO"
          echo "clone_url=$CLONE_URL"
          echo "platform=$PLATFORM" >> $GITHUB_OUTPUT
          echo "owner=$OWNER" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "clone_url=$CLONE_URL" >> $GITHUB_OUTPUT

      - name: Clone source repository
        env:
          CLONE_URL: ${{ steps.parse.outputs.clone_url }}
          PLATFORM: ${{ steps.parse.outputs.platform }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEA_SOURCE_TOKEN: ${{ secrets.GITEA_SOURCE_TOKEN }}
          SKILL_PATH: ${{ inputs.skill_path }}
        run: |
          set -euo pipefail

          # Configure git for better network handling
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999

          # Add authentication for private repos
          AUTH_URL="$CLONE_URL"
          if [ -n "$GITEA_SOURCE_TOKEN" ] && [ "$PLATFORM" = "gitea" ]; then
            AUTH_URL=$(echo "$CLONE_URL" | sed "s|http://|http://oauth2:${GITEA_SOURCE_TOKEN}@|")
          elif [ -n "$GITHUB_TOKEN" ] && [ "$PLATFORM" = "github" ]; then
            AUTH_URL="https://oauth2:${GITHUB_TOKEN}@${CLONE_URL#https://}"
          fi

          # Clone with retry logic
          clone_repo() {
            if [ -n "$SKILL_PATH" ]; then
              echo "🔄 Using sparse checkout for: $SKILL_PATH"
              git clone --filter=blob:none --sparse --depth 1 "$AUTH_URL" /tmp/source-repo
              cd /tmp/source-repo
              git sparse-checkout set "$SKILL_PATH"
              echo "✅ Sparse cloned: $SKILL_PATH"
            else
              git clone --depth 1 "$AUTH_URL" /tmp/source-repo
              echo "✅ Cloned $CLONE_URL"
            fi
          }

          # Try cloning with retries
          for i in 1 2 3; do
            rm -rf /tmp/source-repo 2>/dev/null || true
            if clone_repo; then
              echo "✅ Clone successful on attempt $i"
              break
            fi
            echo "⚠️ Clone failed on attempt $i, retrying in 10s..."
            sleep 10
          done

      - name: Discover SKILL.md files
        id: discover
        env:
          SKILL_PATH: ${{ inputs.skill_path }}
        run: |
          set -euo pipefail

          SEARCH_DIR="/tmp/source-repo"
          [ -n "$SKILL_PATH" ] && SEARCH_DIR="/tmp/source-repo/$SKILL_PATH"

          echo "🔍 Searching in: $SEARCH_DIR"

          SKILL_COUNT=$(find "$SEARCH_DIR" -name "SKILL.md" -type f 2>/dev/null | wc -l || echo 0)
          echo "skill_count=$SKILL_COUNT" >> $GITHUB_OUTPUT
          echo "📊 Found $SKILL_COUNT skill(s)"

          if [ "$SKILL_COUNT" -eq 0 ]; then
            echo "::warning::No SKILL.md files found"
          fi

      - name: Process skills
        id: process
        if: steps.discover.outputs.skill_count != '0'
        env:
          SOURCE_URL: ${{ inputs.source_url }}
          SKILL_PATH: ${{ inputs.skill_path }}
          OWNER: ${{ steps.parse.outputs.owner }}
        run: |
          set -euo pipefail

          SEARCH_DIR="/tmp/source-repo"
          [ -n "$SKILL_PATH" ] && SEARCH_DIR="/tmp/source-repo/$SKILL_PATH"

          mkdir -p pending/$OWNER

          # Process each SKILL.md
          for skill_md in $(find "$SEARCH_DIR" -name "SKILL.md" -type f 2>/dev/null); do
            SKILL_DIR=$(dirname "$skill_md")
            SKILL_NAME=$(grep -E '^name:' "$skill_md" 2>/dev/null | head -1 | sed 's/name:[[:space:]]*//' || basename "$SKILL_DIR")
            SLUG=$(echo "$SKILL_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/^-*//;s/-*$//;s/--*/-/g')

            echo "📦 Processing: $SKILL_NAME ($SLUG)"

            TARGET_DIR="pending/$OWNER/$SLUG"
            mkdir -p "$TARGET_DIR"

            # Copy skill files
            cp -r "$SKILL_DIR"/* "$TARGET_DIR/" 2>/dev/null || cp "$skill_md" "$TARGET_DIR/"

            # Generate basic skill-report.json (audit-skills.yml will update with full audit)
            cat > "$TARGET_DIR/skill-report.json" << EOF
          {
            "meta": {
              "slug": "$SLUG",
              "name": "$SKILL_NAME",
              "owner": "$OWNER",
              "source_url": "$SOURCE_URL",
              "processed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            },
            "security_audit": {
              "risk_level": "pending",
              "summary": "Awaiting security audit"
            }
          }
          EOF

            echo "✅ Processed: $SLUG"
          done

          # Count processed skills
          PROCESSED=$(find pending/$OWNER -name "skill-report.json" 2>/dev/null | wc -l || echo 0)
          echo "processed_count=$PROCESSED" >> $GITHUB_OUTPUT
          echo "📊 Processed $PROCESSED skill(s)"

      - name: Create Pull Request
        id: pr
        if: steps.discover.outputs.skill_count != '0' && steps.discover.outputs.skill_count != 0
        env:
          GITEA_TOKEN: ${{ secrets.GITEATOKEN }}
          OWNER: ${{ steps.parse.outputs.owner }}
          REPO: ${{ github.repository }}
          PROCESSED_COUNT: ${{ steps.process.outputs.processed_count }}
        run: |
          set -euo pipefail

          # Generate branch name
          BRANCH_NAME="submission/$(date +%Y%m%d-%H%M%S)"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

          # Configure git
          git config user.name "skillstore-bot"
          git config user.email "bot@local"

          # Delete existing branch if present
          git push origin --delete "$BRANCH_NAME" 2>/dev/null || true

          # Create branch and commit
          git checkout -b "$BRANCH_NAME"
          git add pending/
          git commit -m "Add $PROCESSED_COUNT pending skill(s) from $OWNER" || {
            echo "::warning::No changes to commit"
            exit 0
          }
          git push origin "$BRANCH_NAME"

          # Create PR via Gitea API
          PR_RESPONSE=$(curl -s -X POST "${{ env.GITEA_API_URL }}/repos/${{ github.repository }}/pulls" \
            -H "Authorization: token $GITEA_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"title\": \"New skill submission from $OWNER\",
              \"head\": \"$BRANCH_NAME\",
              \"base\": \"main\",
              \"body\": \"## Skill Submission\n\n**Source**: ${{ inputs.source_url }}\n**Skills processed**: $PROCESSED_COUNT\n\n---\n*Processed by Gitea Actions*\"
            }")

          PR_NUMBER=$(echo "$PR_RESPONSE" | jq -r '.number // empty')

          if [ -n "$PR_NUMBER" ]; then
            echo "✅ PR #$PR_NUMBER created"

            # Add label
            curl -s -X POST "${{ env.GITEA_API_URL }}/repos/${{ github.repository }}/issues/$PR_NUMBER/labels" \
              -H "Authorization: token $GITEA_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"labels": ["pending-review"]}' || true

            echo "pr_url=http://172.28.95.77:3000/${{ github.repository }}/pulls/$PR_NUMBER" >> $GITHUB_OUTPUT
          else
            echo "::error::Failed to create PR: $PR_RESPONSE"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          rm -rf /tmp/source-repo 2>/dev/null || true
          echo "🧹 Cleanup complete"

      - name: Summary
        if: always()
        env:
          SKILL_COUNT: ${{ steps.discover.outputs.skill_count }}
          PROCESSED_COUNT: ${{ steps.process.outputs.processed_count }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
        run: |
          echo "## Submission Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Source URL | ${{ inputs.source_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Skills Found | ${SKILL_COUNT:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| Skills Processed | ${PROCESSED_COUNT:-0} |" >> $GITHUB_STEP_SUMMARY

          if [ -n "$PR_URL" ]; then
            echo "| PR URL | [$PR_URL]($PR_URL) |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Pull Request created:** $PR_URL"
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ No PR created (no skills found or processing failed)"
          fi

  # Run security audit on PR branch and commit results
  audit:
    needs: process
    if: needs.process.outputs.skill_count != '0' && needs.process.outputs.skill_count != ''
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      audited_count: ${{ steps.audit.outputs.audited_count }}

    steps:
      - name: Checkout repository with skill-report-generator
        env:
          GITEA_TOKEN: ${{ secrets.GITEATOKEN }}
          BRANCH_NAME: ${{ needs.process.outputs.branch_name }}
        run: |
          # Clone the repository
          git clone http://oauth2:${GITEA_TOKEN}@172.28.95.77:3000/${{ github.repository }}.git .

          # Save skill-report-generator from main branch
          git checkout main
          cp -r skill-report-generator /tmp/skill-report-generator

          # Checkout PR branch for pending skills
          git checkout "$BRANCH_NAME"

          # Restore skill-report-generator
          cp -r /tmp/skill-report-generator .

      - name: Install Python and dependencies
        run: |
          apt-get update && apt-get install -y python3 python3-pip
          pip3 install openai rich pyyaml --break-system-packages

      - name: Run security audit
        id: audit
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          set -euo pipefail

          AUDITED_COUNT=0

          # Build config values with defaults
          API_BASE_URL="${OPENAI_BASE_URL:-https://api.openai.com/v1}"
          API_KEY="${OPENAI_API_KEY:-}"
          API_MODEL="${OPENAI_MODEL:-gpt-4o}"

          # Create config for generate.py
          mkdir -p /tmp/audit-config
          cat > /tmp/audit-config/config.yaml << EOF
          api:
            base_url: "$API_BASE_URL"
            api_key: "$API_KEY"
            model: "$API_MODEL"
            timeout: 120
          generation:
            concurrent: 1
            retry: 2
          EOF

          # Count skills
          SKILL_COUNT=$(find pending -name "SKILL.md" -type f 2>/dev/null | wc -l || echo 0)

          if [ "$SKILL_COUNT" -gt 0 ]; then
            echo "🔒 Running security audit on $SKILL_COUNT skill(s)..."

            python skill-report-generator/generate.py \
              --input pending \
              --scan \
              --config /tmp/audit-config/config.yaml \
              --verbose && AUDITED_COUNT=$SKILL_COUNT
          fi

          echo ""
          echo "📊 Audit complete: $AUDITED_COUNT/$SKILL_COUNT skills audited"
          echo "audited_count=$AUDITED_COUNT" >> $GITHUB_OUTPUT

      - name: Commit audit results to PR branch
        if: steps.audit.outputs.audited_count != '0'
        env:
          GITEA_TOKEN: ${{ secrets.GITEATOKEN }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ needs.process.outputs.branch_name }}
          AUDITED_COUNT: ${{ steps.audit.outputs.audited_count }}
        run: |
          set -euo pipefail

          # Configure git
          git config user.name "skillstore-bot"
          git config user.email "bot@local"

          # Stage audit results
          git add "pending/"*/*/skill-report.json 2>/dev/null || \
          git add "pending/"*/skill-report.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "🔒 Security audit for $AUDITED_COUNT skill(s)"

          # Push to PR branch
          git push http://oauth2:${GITEA_TOKEN}@172.28.95.77:3000/${REPOSITORY}.git "$BRANCH_NAME"

          echo "✅ Committed audit results to PR branch: $BRANCH_NAME"

      - name: Summary
        if: always()
        env:
          AUDITED_COUNT: ${{ steps.audit.outputs.audited_count }}
          BRANCH_NAME: ${{ needs.process.outputs.branch_name }}
        run: |
          echo "## Security Audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${BRANCH_NAME} |" >> $GITHUB_STEP_SUMMARY
          echo "| Skills Audited | ${AUDITED_COUNT:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔒 Audit results committed to PR branch." >> $GITHUB_STEP_SUMMARY
